<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Splitter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="titlebar"></div>

  <div class="container">
    <div class="card">
      <!-- Header -->
      <div class="header">
        <h1>✂️ Video Splitter</h1>
        <p>Lấy 3s → Bỏ 3s → Lặp lại → Ghép thành video mới</p>
      </div>

      <!-- Settings -->
      <div class="settings-row">
        <div class="setting-field">
          <label for="keepDuration">⏱ Lấy (giây)</label>
          <input type="number" id="keepDuration" value="3" min="0.5" step="0.5" />
        </div>
        <div class="setting-field">
          <label for="skipDuration">⏭ Bỏ (giây)</label>
          <input type="number" id="skipDuration" value="3" min="0.5" step="0.5" />
        </div>
      </div>

      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <span class="drop-zone-icon">📁</span>
        <div class="drop-zone-text">
          <span id="dropText">Click hoặc kéo thả video vào đây</span>
          <span class="file-name" id="fileName"></span>
        </div>
      </div>

      <!-- Process Button -->
      <button class="btn-process" id="btnProcess" disabled>
        Cắt &amp; Ghép Video
      </button>

      <!-- Progress -->
      <div class="progress-section" id="progressSection">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-status" id="progressStatus">
          <span class="spinner"></span> Đang chuẩn bị...
        </div>
      </div>

      <!-- Result -->
      <div class="result-section" id="resultSection"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
